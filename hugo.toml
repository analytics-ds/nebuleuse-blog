baseURL = "https://analytics-ds.github.io/nebuleuse-blog/"
title = "Le Mag Bijoux"
theme = "nebuleuse"

defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = false

enableRobotsTXT = true

[languages]
  [languages.fr]
    languageCode = "fr-FR"
    languageName = "Français"
    weight = 1
    title = "Le Mag Bijoux"
    contentDir = "content/fr"
    [languages.fr.params]
      description = "Le magazine des bijoux pour femmes : piercings, boucles d'oreilles, bijoux de corps et actualités bijoux pour femmes."

  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    weight = 2
    title = "Le Mag Bijoux"
    contentDir = "content/en"
    [languages.en.params]
      description = "The women jewelry magazine: piercings, earrings, body jewelry and jewelry news for women."

[taxonomies]
  category = "categories"
  tag = "tags"

[[languages.fr.menus.main]]
  name = "Accueil"
  url = "./"
  weight = 1
[[languages.fr.menus.main]]
  name = "Piercings"
  url = "categories/piercings/"
  weight = 2
[[languages.fr.menus.main]]
  name = "Boucles d'oreilles"
  url = "categories/boucles-doreilles/"
  weight = 3
[[languages.fr.menus.main]]
  name = "Bijoux de corps"
  url = "categories/bijoux-de-corps/"
  weight = 4
[[languages.fr.menus.main]]
  name = "Actualités"
  url = "categories/actualites/"
  weight = 5
[[languages.fr.menus.main]]
  name = "Le Blog"
  url = "blog/"
  weight = 99

[[languages.fr.menus.footer]]
  name = "À propos"
  url = "a-propos/"
  weight = 1
[[languages.fr.menus.footer]]
  name = "Les auteurs"
  url = "auteurs/"
  weight = 2
[[languages.fr.menus.footer]]
  name = "Plan du site"
  url = "plan-du-site/"
  weight = 3

[[languages.en.menus.main]]
  name = "Home"
  url = "en/"
  weight = 1
[[languages.en.menus.main]]
  name = "Piercings"
  url = "en/categories/piercings/"
  weight = 2
[[languages.en.menus.main]]
  name = "Earrings"
  url = "en/categories/earrings/"
  weight = 3
[[languages.en.menus.main]]
  name = "Body jewelry"
  url = "en/categories/body-jewelry/"
  weight = 4
[[languages.en.menus.main]]
  name = "News"
  url = "en/categories/news/"
  weight = 5
[[languages.en.menus.main]]
  name = "The Blog"
  url = "en/blog/"
  weight = 99

[[languages.en.menus.footer]]
  name = "About"
  url = "en/about/"
  weight = 1
[[languages.en.menus.footer]]
  name = "Authors"
  url = "en/authors/"
  weight = 2
[[languages.en.menus.footer]]
  name = "Site map"
  url = "en/site-map/"
  weight = 3

[params]
  default_og_image = "images/og-default.jpg"
  logo = "favicon.svg"
  founding_year = "2026"
  expertise = ["Bijoux pour femmes", "Piercings", "Boucles d'oreilles", "Bijoux de corps"]
  og_locale_alternate = "en_US"

[related]
  includeNewer = true
  threshold = 80
  [[related.indices]]
    name = "categories"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 80

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = true
  [markup.goldmark.renderer]
    unsafe = true

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5
