# Auteurs du blog Le Mag Bijoux — multilingue FR/EN
# Structure : map d'auteurs indexee par ID (slug)
# L'ID est utilise dans le frontmatter des articles comme `author: magalie-ergoz`
#
# Le champ `topics` sert a la selection automatique de l'auteur dans /create-article.
# Le champ `expertise` alimente le schema.org Person -> knowsAbout.

thomas-durand:
  id: thomas-durand
  name: Thomas Durand
  type: person
  avatar: images/authors/thomas-durand.jpg
  linkedinUrl: ""
  jobTitle:
    fr: Historien du bijou & critique joaillerie
    en: Jewelry historian & joaillerie critic
  role:
    fr: Historien du bijou & critique joaillerie
    en: Jewelry historian & joaillerie critic
  bio:
    fr: "Thomas Durand est historien du bijou formé à l'École du Louvre. Il décrypte l'évolution des formes, des matériaux et des maisons, du XIXe siècle aux créateurs contemporains, pour remettre chaque tendance dans sa perspective culturelle."
    en: "Thomas Durand is a jewelry historian trained at the École du Louvre. He decodes the evolution of shapes, materials and houses, from the 19th century to contemporary creators, to place each trend in its cultural perspective."
  expertise:
    - Histoire du bijou
    - Joaillerie contemporaine
    - Grandes maisons
    - Art déco
    - Orfèvrerie
    - Critique créateurs
  topics:
