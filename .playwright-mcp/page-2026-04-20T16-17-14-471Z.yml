            - generic [ref=e12]:
              - text: "Dans le domaine de la mode, le \"sur mesure\" est toujours le meilleur choix. C'est pourquoi Vogue met au service la technologie afin d'adapter ses articles à vos centres d'intérêt et vous tenir au courant de tout: des dernières tendances de la semaine de la mode à Paris au dernier It-bag dans lequel investir. Cette technologie permet également à des tiers (et en particulier à nos partenaires publicitaires sélectionnés dans le secteur du luxe) de vous présenter des campagnes et des contenus publicitaires personnalisés, tout en donnant aux créateurs de contenu la possibilité de découvrir les types d'articles que vous aimez et d'écrire sur ces sujets. Considérez que c'est votre chance d'être à l'avant-garde - et d'avoir le dernier mot - sur tout le contenu de Vogue. Nous et nos partenaires"
              - button "228" [ref=e13] [cursor=pointer]
              - generic [ref=e14]:
                - text: utilisons des cookies et des méthodes similaires pour reconnaître les visiteurs et mémoriser leurs préférences. Nous pouvons également utiliser ces technologies pour évaluer l'efficacité des campagnes publicitaires, cibler les publicités et analyser le trafic du site web. Certaines de ces technologies sont essentielles au bon fonctionnement du service ou du site web et ne peuvent pas être désactivées, tandis que d'autres sont facultatives mais servent à améliorer l'expérience utilisateur de diverses manières.
                - link "Politique de Confidentialite" [ref=e15] [cursor=pointer]:
                  - /url: https://www.vogue.fr/info/politique-de-confidentialite
                - text: En collaboration avec nos partenaires, nous stockons et/ou accédons à des informations sur votre appareil et traitons vos données personnelles, telles que vos données de navigation et les identifiants de votre appareil, à des fins de personnalisation de la publicité et du contenu, de mesure de la performance publicitaire et du contenu, d'études d'audience et de développement de services, notamment grâce à l'utilisation de données de géolocalisation précises et à l'identification par analyse active de votre appareil. Vous pouvez retirer votre consentement ou gérer vos préférences à tout moment en sélectionnant l'option « Vos choix en matière de confidentialité » située en bas de page du site web ou dans la section « Confidentialité et conditions d'utilisation » des paramètres de votre application. Pour consulter ou vous opposer à l'utilisation de vos données par nos partenaires lorsque ceux-ci font valoir un intérêt légitime, veuillez consulter la page de nos fournisseurs. Vos préférences s'appliqueront uniquement à ce site web.
